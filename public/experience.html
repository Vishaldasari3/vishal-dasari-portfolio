<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Experience — Vishal Dasari</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<link rel="stylesheet" href="partials/partials.css">
<style>
  html, body { margin: 0; background: #f4f5f9; }
  * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
  a { color: #3654e0; text-decoration: none; }
  a:hover { color: #24399e; }

  @media (max-width: 900px) {
    #ex-projects-grid { grid-template-columns: 1fr !important; }
    #ex-timeline-item { flex-direction: column !important; gap: 8px !important; }
    #ex-modal-panel { width: 92% !important; padding: 32px 24px !important; }
  }
  @media (max-width: 480px) {
    #site-nav-items { gap: 12px !important; flex-wrap: wrap !important; justify-content: center !important; }
    #site-nav-items a { font-size: 14px !important; }
  }
  @media (max-width: 1180px) {
    #site-header-row { padding: 18px 20px !important; gap: 12px !important; }
    #site-nav-items { gap: 1px !important; padding: 5px !important; }
    #site-nav-items a, #site-nav-items span { font-size: 12.5px !important; padding: 7px 9px !important; }
  }
  @media (max-width: 860px) {
    #site-header-row { flex-direction: column !important; align-items: center !important; padding: 20px 24px 16px !important; }
    #site-header-grid { width: 100% !important; flex: none !important; }
    #site-header-spacer { height: 150px !important; }
  }
  @media (max-width: 640px) {
    #site-nav-items { flex-wrap: wrap !important; justify-content: center !important; }
  }
  .hv40:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(44,70,201,0.12); }
  .hv41:hover, .hv42:hover, .hv43:hover { transform: translateY(-3px) scale(1.08); box-shadow: 0 6px 16px rgba(54,84,224,0.35), 0 0 14px rgba(54,84,224,0.4); }
</style>
</head>
<body data-page="experience">

<div id="site-header"></div>
<div id="site-header-spacer" style="height: 82px;"></div>

<!-- hero band -->
<div style="background: #f4f5fb; background-image: radial-gradient(rgba(54,84,224,0.1) 1px, transparent 1px); background-size: 22px 22px; padding: 36px 56px 40px; position: relative; overflow: hidden; border-bottom: 1.5px solid #dde1f0; box-shadow: 0 6px 20px rgba(28,32,48,0.05);">
  <canvas id="hero-icosa-canvas" style="position: absolute; right: 40px; top: -20px; width: 220px; height: 220px; pointer-events: none;"></canvas>
  <div style="max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; position: relative; z-index: 1;">
    <span style="display: inline-flex; align-items: center; width: fit-content; font-size: 13px; font-weight: 600; color: #3654e0; letter-spacing: 1.5px; text-transform: uppercase;">Experience &amp; Projects</span>
    <div style="font-size: clamp(38px, 4.2vw, 54px); font-weight: 700; color: #1c2030; line-height: 1.1; letter-spacing: -1px;">9+ years shipping<br/>production software.</div>
    <div style="font-size: 16px; color: #6b7290; line-height: 1.65; max-width: 480px;">From embedded sensor systems to enterprise cloud migrations &mdash; a look at where I've worked and what I've built.</div>
  </div>
</div>

<!-- content -->
<div style="max-width: 1100px; margin: 0 auto; padding: 72px 56px 100px; display: flex; flex-direction: column; gap: 80px;">

  <!-- timeline -->
  <div style="display: flex; flex-direction: column; gap: 36px;">
    <div style="font-size: 13px; font-weight: 600; color: #3654e0; letter-spacing: 1.5px; text-transform: uppercase;">Work History</div>
    <div id="ex-roles"></div>
  </div>

  <!-- projects -->
  <div style="display: flex; flex-direction: column; gap: 28px;">
    <div style="font-size: 13px; font-weight: 600; color: #3654e0; letter-spacing: 1.5px; text-transform: uppercase;">Featured Projects</div>
    <div id="ex-projects-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;"></div>
  </div>

</div>

<!-- modal -->
<div id="ex-modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(28,32,48,0.35); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 10; padding: 24px;">
  <div id="ex-modal-panel" style="position: relative; width: 100%; max-width: 560px; max-height: 82vh; overflow-y: auto; background: rgba(255,255,255,0.72); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.6); border-radius: 20px; padding: 44px; box-shadow: 0 24px 60px rgba(28,32,48,0.25); display: flex; flex-direction: column; gap: 18px;">
    <div id="ex-modal-close" style="position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; border-radius: 50%; background: rgba(28,32,48,0.06); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; color: #1c2030;">&times;</div>
    <div id="ex-modal-title" style="font-size: 22px; font-weight: 700; color: #1c2030; padding-right: 32px;"></div>
    <div id="ex-modal-tags" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
    <div id="ex-modal-details" style="display: flex; flex-direction: column; gap: 12px; margin-top: 6px;"></div>
  </div>
</div>

<div id="site-footer"></div>

<script src="js/three-scenes.js"></script>
<script src="js/common.js"></script>
<script src="js/cursor-effects.js"></script>
<script src="js/experience.js"></script>
</body>
</html>
