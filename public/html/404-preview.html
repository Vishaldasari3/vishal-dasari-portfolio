<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>404 — Vishal Dasari</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#f4f5fb;font-family:'Poppins',sans-serif;overflow-x:hidden;}
  #stage{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;perspective:1400px;overflow:hidden;}
  .blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:0.55;}
  .blob1{width:480px;height:480px;background:radial-gradient(circle,#4f6bff,transparent 68%);top:-120px;left:-100px;animation:drift1 16s ease-in-out infinite;}
  .blob2{width:420px;height:420px;background:radial-gradient(circle,#00e0c6,transparent 68%);bottom:-140px;right:-80px;animation:drift2 18s ease-in-out infinite;}
  .blob3{width:340px;height:340px;background:radial-gradient(circle,#ff5fae,transparent 68%);top:40%;left:60%;animation:drift3 14s ease-in-out infinite;}
  @keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,40px)}}
  @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,-30px)}}
  @keyframes drift3{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,50px)}}
  .grid-overlay{position:absolute;inset:0;background-image:radial-gradient(rgba(60,84,224,0.12) 1px, transparent 1px);background-size:26px 26px;mask-image:radial-gradient(ellipse at center, black 0%, transparent 72%);}
  .num404{position:absolute;font-family:'Syne',sans-serif;font-weight:800;font-size:min(38vw,420px);letter-spacing:-10px;color:transparent;-webkit-text-stroke:1.5px rgba(60,84,224,0.12);z-index:0;user-select:none;pointer-events:none;}
  .paw{position:absolute;bottom:-40px;font-size:30px;opacity:0;animation:rise linear infinite;pointer-events:auto;cursor:pointer;transition:transform .15s ease;}
  .paw:hover{transform:scale(1.4) rotate(-10deg);}
  @keyframes rise{0%{transform:translateY(0) rotate(0deg);opacity:0;}10%{opacity:.5;}90%{opacity:.35;}100%{transform:translateY(-110vh) rotate(40deg);opacity:0;}}
  .card::before{content:'';position:absolute;top:-2px;left:-2px;right:-2px;height:6px;background:linear-gradient(90deg,#4f6bff,#00e0c6,#ff5fae,#4f6bff);background-size:300% auto;animation:sheen 6s linear infinite;}
  .card{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:20px;text-align:center;padding:56px 48px;width:100%;max-width:640px;
    background:linear-gradient(160deg, rgba(255,255,255,0.85) 0%, rgba(238,241,255,0.85) 45%, rgba(255,240,250,0.8) 100%);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,0.9);
    border-radius:28px;box-shadow:0 30px 80px -30px rgba(60,70,140,0.28), 0 0 0 1px rgba(124,92,255,0.08), inset 0 1px 0 rgba(255,255,255,0.9);position:relative;overflow:hidden;
    transform-style:preserve-3d;transition:transform .25s ease;
    opacity:0;animation:cardIn .8s cubic-bezier(.22,1,.36,1) forwards;}
  @keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.94);}to{opacity:1;transform:translateY(0) scale(1);}}
  .photo-wrap{animation:bp404-float 3s ease-in-out infinite;}
  .photo-wrap img{width:240px;height:240px;object-fit:cover;border-radius:26px;box-shadow:0 24px 50px -18px rgba(60,70,140,0.25);transition:transform .15s ease;transform-style:preserve-3d;}
  @keyframes bp404-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  .name{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;letter-spacing:-1.5px;background:linear-gradient(120deg,#7c9cff,#c39bff,#5eeaff,#7c9cff);background-size:300% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:sheen 5s linear infinite;}
  @keyframes sheen{to{background-position:300% center;}}
  .tagline{font-size:18px;font-weight:600;color:#20244a;opacity:0;animation:fadeUp .7s ease .3s forwards;}
  .desc{font-size:14px;color:#5c6288;max-width:380px;opacity:0;animation:fadeUp .7s ease .45s forwards;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .btn{margin-top:6px;display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:#f4f5fb;background:linear-gradient(135deg,#3654e0,#7c5cff);padding:12px 24px;border-radius:26px;color:#fff;
    box-shadow:0 14px 30px -10px rgba(54,84,224,0.45);text-decoration:none;opacity:0;animation:fadeUp .7s ease .6s forwards;transition:transform .18s ease, box-shadow .18s ease;}
  .btn-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;perspective:800px;}
  .b3d{position:relative;display:inline-flex;align-items:center;justify-content:center;width:170px;gap:8px;font-size:12.5px;font-weight:700;color:#fff;letter-spacing:0.2px;
    background:linear-gradient(135deg,#3654e0,#7c5cff,#22ddf5);background-size:220% auto;background-position:0% center;padding:11px 20px;border-radius:24px;text-decoration:none;
    box-shadow:0 14px 30px -10px rgba(54,84,224,0.5);transform-style:preserve-3d;
    transition:transform .35s cubic-bezier(.22,1,.36,1), box-shadow .35s ease, background-position .5s ease, letter-spacing .3s ease;opacity:0;animation:fadeUp .7s ease .6s forwards;}
  .b3d::before{content:'';position:absolute;inset:0;border-radius:26px;background:linear-gradient(120deg,rgba(255,255,255,0.35),transparent 40%);opacity:0;transition:opacity .3s ease;}
  .b3d::after{content:'';position:absolute;inset:-3px;border-radius:29px;box-shadow:0 0 0 0 rgba(124,92,255,0.4);opacity:0;transition:opacity .3s ease;pointer-events:none;}
  .b3d:hover{transform:rotateX(14deg) translateY(-6px) scale(1.06);box-shadow:0 26px 46px -14px rgba(54,84,224,0.6), 0 0 24px -2px rgba(34,221,245,0.5);background-position:100% center;letter-spacing:0.6px;}
  .b3d:hover::before{opacity:1;}
  .b3d:hover::after{opacity:1;animation:pulseRing 1.1s ease-out infinite;}
  .b3d:active{transform:rotateX(6deg) translateY(-2px) scale(0.98);}
  .b3d svg{position:relative;transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
  .b3d:hover svg{transform:translateX(5px) scale(1.15);}
  @keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(124,92,255,0.35);}100%{box-shadow:0 0 0 8px rgba(124,92,255,0);}}
</style>
</head>
<body>
  <div id="stage">
    <div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div>
    <div class="grid-overlay"></div>
    <div class="num404" id="bignum">404</div>
    <div id="paws"></div>
    <div class="card" id="card">
      <div class="photo-wrap" id="photoWrap"><img id="dogImg" src="" alt=""></div>
      <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7c5cff;opacity:0;animation:fadeUp .7s ease .15s forwards;">Halted by the guard</div>
      <div class="name" id="dogName"></div>
      <div class="tagline" id="dogTag"></div>
      <div class="desc" id="dogDesc"></div>
      <div class="btn-row">
        <a href="/blog" class="b3d">Back to the blog
          <svg width="14" height="11" viewBox="0 0 16 12" fill="none"><path d="M1 6h13M9 1l5 5-5 5" stroke="#f4f5fb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <a href="/" class="b3d">Back to home
          <svg width="14" height="11" viewBox="0 0 16 12" fill="none"><path d="M1 6h13M9 1l5 5-5 5" stroke="#f4f5fb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </div>
    </div>
  </div>
  <script>
    var DOGS = [
      { name: 'Junnu', img: '../assets/404-dogs/junnu.jpg', tag: "The self-appointed guardian of this site." },
      { name: 'Jimmy', img: '../assets/404-dogs/jimmy.jpg', tag: "Best friends with every rabbit, worst enemy of broken links." },
      { name: 'Bruno', img: '../assets/404-dogs/bruno.jpg', tag: "Keeps the cats in line and the 404s in check." },
      { name: 'Simba', img: '../assets/404-dogs/simba.jpg', tag: "Small dog, big attitude, zero patience for dead ends." },
      { name: 'Cooper', img: '../assets/404-dogs/cooper.jpg', tag: "Fluffy, floppy, and fiercely loyal to lost pages." },
      { name: 'Bagel', img: '../assets/404-dogs/bagel.jpg', tag: "Snorting his way through every wrong turn." },
      { name: 'Milo', img: '../assets/404-dogs/milo.jpg', tag: "Too cute to be mad at, even about this 404." }
    ];
    var dog = DOGS[Math.floor(Math.random() * DOGS.length)];
    document.getElementById('dogImg').src = dog.img;
    document.getElementById('dogImg').alt = dog.name;
    document.getElementById('dogName').textContent = dog.name;
    document.getElementById('dogTag').textContent = dog.tag;
    document.getElementById('dogDesc').textContent = dog.name + " sniffed around and found nothing here \u2014 this page is hidden, wandered off, or never existed. Try one of these instead:";

    function playPawTap() {
      var ctx = playPawTap._ctx || (playPawTap._ctx = new (window.AudioContext || window.webkitAudioContext)());
      var t = ctx.currentTime;
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(180 + Math.random() * 40, t);
      o.frequency.exponentialRampToValueAtTime(70, t + 0.12);
      g.gain.setValueAtTime(0.16, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
      o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t + 0.15);
    }
    var pawsEl = document.getElementById('paws');
    for (var i = 0; i < 22; i++) {
      var p = document.createElement('span');
      p.className = 'paw'; p.textContent = '\uD83D\uDC3E';
      p.style.left = (Math.random() * 100) + 'vw';
      p.style.animationDuration = (14 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.addEventListener('mouseenter', playPawTap);
      pawsEl.appendChild(p);
    }

    function confettiBurst(x, y) {
      var colors = ['#3654e0','#7c5cff','#22ddf5','#ff5fae','#4f6bff','#00e0c6'];
      for (var i = 0; i < 26; i++) {
        var c = document.createElement('span');
        var col = colors[Math.floor(Math.random() * colors.length)];
        var ang = Math.random() * Math.PI * 2, dist = 60 + Math.random() * 90;
        var dx = Math.cos(ang) * dist, dy = Math.sin(ang) * dist - 40;
        c.style.cssText = 'position:fixed;left:' + x + 'px;top:' + y + 'px;width:' + (6 + Math.random() * 5) + 'px;height:' + (6 + Math.random() * 5) + 'px;background:' + col + ';border-radius:' + (Math.random() > 0.5 ? '50%' : '2px') + ';pointer-events:none;z-index:999;opacity:1;transition:transform .8s cubic-bezier(.2,.8,.3,1), opacity .8s ease;';
        document.body.appendChild(c);
        requestAnimationFrame(function (el, ddx, ddy) {
          return function () {
            el.style.transform = 'translate(' + ddx + 'px,' + ddy + 'px) rotate(' + (Math.random() * 360) + 'deg)';
            el.style.opacity = '0';
          };
        }(c, dx, dy));
        setTimeout(function (el) { return function () { el.remove(); }; }(c), 850);
      }
    }
    document.querySelectorAll('.b3d').forEach(function (el) {
      el.addEventListener('click', function (e) {
        e.preventDefault();
        var r = el.getBoundingClientRect();
        confettiBurst(r.left + r.width / 2, r.top + r.height / 2);
        var href = el.getAttribute('href');
        setTimeout(function () { window.location.href = href; }, 260);
      });
    });

    var img = document.getElementById('dogImg');
    var card = document.getElementById('card');
    card.addEventListener('mousemove', function (e) {
      var r = card.getBoundingClientRect();
      var x = (e.clientX - r.left) / r.width - 0.5;
      var y = (e.clientY - r.top) / r.height - 0.5;
      img.style.transform = 'rotateY(' + (x * 16) + 'deg) rotateX(' + (-y * 16) + 'deg)';
      card.style.transform = 'rotateY(' + (x * 4) + 'deg) rotateX(' + (-y * 4) + 'deg)';
    });
    card.addEventListener('mouseleave', function () {
      img.style.transform = 'rotateY(0) rotateX(0)';
      card.style.transform = 'rotateY(0) rotateX(0)';
    });
  </script>
</body>
</html>
